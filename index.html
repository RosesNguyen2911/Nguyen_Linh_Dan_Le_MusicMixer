<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎶 Farm Symphony 🎶</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- Header -->
    <div id="header">
        <h1 id="title">🎶 Farm Symphony - Drag and Drop Animal 🎶</h1>
    </div>

    <!-- Control Panel -->
    <nav id="control-panel">
        <button id="play-btn">▶️ Play</button>
        <button id="stop-btn">⏹ Stop</button>
        <button id="replay-btn">🔄 Replay</button>
    </nav>

    <!-- Main Content -->
    <section id="main-content">
        <!-- Farm Background -->
        <div id="farm-background"></div>

        <!-- Animal Selection Toolbar -->
        <div id="animal-toolbar">
            <h2>Select an Animal</h2>
            <div class="animal-box">
                <div class="animal" id="chicken">
                    <img src="images/chicken.svg" alt="Chicken">
                    <h3>Chicken</h3>
                </div>
            </div>
            <div class="animal-box">
                <div class="animal" id="cow">
                    <img src="images/cow.svg" alt="Cow">
                    <h3>Cow</h3>
                </div>
            </div>
            <div class="animal-box">
                <div class="animal" id="pig">
                    <img src="images/pig.svg" alt="Pig">
                    <h3>Pig</h3>
                </div>
            </div>
            <div class="animal-box">
                <div class="animal" id="sheep">
                    <img src="images/sheep.svg" alt="Sheep">
                    <h3>Sheep</h3>
                </div>
            </div>
            <div class="animal-box">
                <div class="animal" id="horse">
                    <img src="images/horse.svg" alt="Horse">
                    <h3>Horse</h3>
                </div>
            </div>
            <div class="animal-box">
                <div class="animal" id="duck">
                    <img src="images/duck.svg" alt="Duck">
                    <h3>Duck</h3>
                </div>
            </div>
        </div>

        <div id="farm-area">
            <p>Drop the animals here!</p>
        </div>
    </section>

    <footer id="footer">
      <h2 class="hidden">© 2025 Farm Symphony. All rights reserved.</h2>
  </footer>

    <script src="js/main.js"></script>

</body>
</html>
